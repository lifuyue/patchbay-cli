name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: issue-finder-aarch64-apple-darwin.tar.gz
            binary: issue-finder
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: issue-finder-x86_64-unknown-linux-gnu.tar.gz
            binary: issue-finder
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: issue-finder-x86_64-pc-windows-msvc.zip
            binary: issue-finder.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Use Rust stable
        run: rustup default stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
          if [[ "${{ matrix.binary }}" == "issue-finder" ]]; then
            chmod 755 "package/${{ matrix.binary }}"
          fi
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            pushd package
            powershell -NoProfile -Command "Compress-Archive -Path '${{ matrix.binary }}' -DestinationPath '../dist/${{ matrix.archive }}' -Force"
            popd
          else
            tar -czf "dist/${{ matrix.archive }}" -C package "${{ matrix.binary }}"
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "Release tag must start with v: $RELEASE_TAG" >&2; exit 1 ;;
          esac
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum issue-finder-* > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Issue Finder ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/issue-finder-aarch64-apple-darwin.tar.gz
            dist/issue-finder-x86_64-unknown-linux-gnu.tar.gz
            dist/issue-finder-x86_64-pc-windows-msvc.zip
            dist/SHA256SUMS
